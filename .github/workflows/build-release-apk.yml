name: Build signed release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;28.0.13004108"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Validate keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ ! -s app/keystore.jks ]; then
            echo "::error::Keystore file is empty — check KEYSTORE_BASE64 secret"
            exit 1
          fi
          keytool -list -keystore app/keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" || {
            echo "::error::Keystore validation failed — check KEYSTORE_PASSWORD and KEY_ALIAS secrets"
            exit 1
          }

      - name: Build signed release APK
        shell: bash
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace assembleRelease 2>&1 | tee /tmp/gradle-release.log

      - name: Verify APK is signed
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          # apksigner is in the Android SDK build-tools
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          echo "Verifying: $APK"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: TurtleBoard-release
          path: app/build/outputs/apk/release/*.apk

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.version.outputs.name }}
          target_commitish: ${{ github.sha }}
          name: TurtleBoard ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.version.outputs.name }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          make_latest: true

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks

      - name: Upload Gradle build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-release-log
          path: /tmp/gradle-release.log

      - name: Archive reports for failed job
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '*/build/reports'
        if: failure()
