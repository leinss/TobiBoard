name: Build signed release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Verify APK is signed
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          # apksigner is in the Android SDK build-tools
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          echo "Verifying: $APK"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: TurtleBoard-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release for tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true

      - name: Create rolling GitHub Release for main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          target_commitish: ${{ github.sha }}
          name: Latest main build
          prerelease: true
          files: app/build/outputs/apk/release/*.apk
          body: |
            Automated signed APK built from `main`.

            Commit: ${{ github.sha }}

      - name: Clean up keystore
        if: always()
        run: rm -f app/keystore.jks

      - name: Archive reports for failed job
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '*/build/reports'
        if: failure()
