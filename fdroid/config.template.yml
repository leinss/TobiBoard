# Template for the self-hosted F-Droid repo config.
#
# CI copies this to fdroid/config.yml and APPENDS keystorepass/keypass from
# GitHub Actions secrets at build time. NEVER put passwords in this committed
# template, and never commit the generated config.yml or the keystore.
repo_url: "https://leinss.xyz/TobiBoard/repo"
repo_name: "TobiBoard"
repo_description: >-
  Self-hosted F-Droid repository for TobiBoard — a privacy-first, on-device
  keyboard (a HeliBoard fork) with optional, bring-your-own-key AI voice-to-text
  and text-fix. Core typing works fully offline.

# Keep every APK that lands in repo/ (no separate archive split).
archive_older: 0

# Repo INDEX signing key — distinct from the app signing key. Supplied by CI;
# the file itself is never committed.
keystore: "keystore.p12"
repo_keyalias: "fdroidrepo"
